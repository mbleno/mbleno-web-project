            <p id="inputReply"></p>

            <nav class="contact-links">
                <a href="/html/homepage.html">Homepage</a>
                <a href="/html/products.html">Products</a>
                <a href="/html/resources.html">Resources</a>
                <a href="/html/aboutus.html">About us</a>
            </nav>

        </div>
    
        <div class="greentech-info">
            <h2>Company Contact Information</h2>
            <p><strong>Phone:</strong> (555)555-5555</p>
            <p><strong>Email:</strong> techsupport@greentech.com</p>
            <p><strong>Address:</strong> 123 Oak Street, Ontario, Canada</p>
        </div>

    </section>
    
</body>

</html>
